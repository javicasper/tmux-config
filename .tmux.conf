# ════════════════════════════════════════════════════════════════════
#  ~/.tmux.conf — config de Javier 🔥 (spec 2026)
#  tmux 3.4 · prefijo C-a · navegación vim · catppuccin · sessionx
# ════════════════════════════════════════════════════════════════════

# ─── Prefijo ────────────────────────────────────────────────────────
# C-b está lejísimos. Lo pasamos a C-a (estilo GNU screen).
unbind C-b
set -g prefix C-a
bind C-a send-prefix          # C-a C-a manda un C-a literal

# ─── Sane defaults ──────────────────────────────────────────────────
set -g mouse on                       # ratón: clic, scroll y resize
set -g base-index 1                   # ventanas empiezan en 1, no en 0
setw -g pane-base-index 1             # paneles también en 1
set -g renumber-windows on            # renumera al cerrar una ventana
set -g history-limit 100000           # scrollback generoso
set -sg escape-time 10                # sin lag para ESC (clave con vim)
set -g focus-events on                # para que vim detecte el foco
set -sg repeat-time 600               # margen para teclas repetibles
set -g set-clipboard on               # integra portapapeles del sistema
set -g display-time 2000              # mensajes visibles 2s
set -g status-interval 5              # refresca la barra cada 5s
setw -g aggressive-resize on          # mejor resize con varios clientes

# Colores: 256 limpios (JuiceSSH NO soporta truecolor/24-bit).
# tmux convierte los pastel de Catppuccin al tono más cercano de 256.
set -g default-terminal "tmux-256color"
# Truecolor activado (Termux lo soporta). Si vuelves a JuiceSSH,
# comenta esta línea para que degrade limpio a 256 colores.
set -ga terminal-overrides ",*:RGB"

# ─── Features de terminal (Claude Code / kitty) ─────────────────────
# Deja pasar a kitty: color real, hyperlinks, teclado extendido,
# portapapeles OSC52 y secuencias gráficas (passthrough). Inofensivo en
# terminales que no son kitty (el override por nombre simplemente no aplica).
set -s extended-keys on
set -as terminal-features 'xterm-kitty:RGB:hyperlinks:extkeys:clipboard:usstyle'
set -g allow-passthrough on

# ─── Recargar config rápido ─────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "✅ Config recargada"

# ─── Splits intuitivos (abren en el directorio actual) ──────────────
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"   # vertical
bind - split-window -v -c "#{pane_current_path}"    # horizontal
bind c new-window -c "#{pane_current_path}"         # nueva ventana

# ─── Navegación de paneles estilo vim ───────────────────────────────
# C-h/j/k/l lo gestiona vim-tmux-navigator (salta entre vim y tmux).
# Con prefijo + h/j/k/l también funciona:
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize con prefijo + H/J/K/L (repetible)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Zoom y mover entre ventanas
bind -r C-h previous-window
bind -r C-l next-window
bind Tab last-window
bind -r Space next-layout

# ─── Copy-mode estilo vim ───────────────────────────────────────────
setw -g mode-keys vi
set -g status-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi r send -X rectangle-toggle
bind -T copy-mode-vi Escape send -X cancel
bind P paste-buffer

# ─── Calidad de vida ────────────────────────────────────────────────
bind b break-pane -d                                # panel -> ventana propia
bind m set -g mouse \; display "🐭 Mouse: #{?mouse,on,off}"
bind X kill-session                                 # mata la sesión actual

# ════════════════════════════════════════════════════════════════════
#  PLUGINS (gestionados con TPM)
# ════════════════════════════════════════════════════════════════════
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'        # defaults sensatos
set -g @plugin 'christoomey/vim-tmux-navigator'    # C-hjkl vim<->tmux
set -g @plugin 'tmux-plugins/tmux-yank'            # copiar al portapapeles
set -g @plugin 'tmux-plugins/tmux-resurrect'       # guardar sesiones
set -g @plugin 'tmux-plugins/tmux-continuum'       # autoguardar/restaurar
set -g @plugin 'omerxx/tmux-sessionx'              # gestor de sesiones fuzzy
set -g @plugin 'catppuccin/tmux#v2.3.0'            # tema v2 pineado (necesita Nerd Font)

# ─── Resurrect + Continuum (persistencia de sesiones) ───────────────
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'                     # restaura al arrancar
set -g @continuum-save-interval '10'               # autoguarda cada 10 min

# ─── sessionx (buscador fuzzy de sesiones con preview) ──────────────
set -g @sessionx-bind 'o'                          # prefijo + o
set -g @sessionx-zoxide-mode 'on'                  # salta a dirs con zoxide
set -g @sessionx-git-branch 'on'                   # muestra rama git
set -g @sessionx-preview-location 'right'
set -g @sessionx-preview-ratio '55%'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'

# ─── Catppuccin v2 (tema modular; requiere Nerd Font en el cliente) ─
set -g @catppuccin_flavor 'mocha'                  # mocha/macchiato/frappe/latte
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_current_text ' #W'
set -g @catppuccin_window_text ' #W'

# ─── Módulo "claude": icono + título de la sesión de Claude Code ─────
# Solo aparece cuando el pane activo corre `claude`. Reproduce el estilo
# de los chips de catppuccin (icono con bg de color + texto con bg surface).
# Toma el título que Claude Code fija en el pane_title (#T), le quita el
# glifo spinner del principio y lo trunca a 40 con elipsis.
# ponytail: el "icono" es un glifo/emoji (el SVG de clawd del waybar no
# entra en una barra de texto). Cambia 🦞 por el glifo que prefieras.
# Las comas de los #[fg=…,bg=…] van escapadas como #, porque dentro de un
# #{?cond,sí,no} la coma separa argumentos y si no cortaría el formato.
set -g @catppuccin_status_claude "#{?#{==:#{pane_current_command},claude},#[fg=#d97757]#[fg=#11111b#,bg=#d97757] 🦞 #[fg=#cdd6f4#,bg=#313244] #{=/40/…:#{s|^[^ ]* ||:pane_title}} #[fg=#313244],}"
set -g @catppuccin_directory_text '#{b:pane_current_path}'
set -g @catppuccin_date_time_text '%H:%M'

# Barra v2: los módulos se componen en status-left/right con #{E:...}
set -g status-left-length 100
set -g status-right-length 100
set -g status-left ''
set -g status-right '#{E:@catppuccin_status_claude}'
set -ag status-right '#{E:@catppuccin_status_directory}'
set -ag status-right '#{E:@catppuccin_status_session}'
set -ag status-right '#{E:@catppuccin_status_date_time}'

set -g status-position bottom
set -g status-justify left

# ─── Inicializar TPM (DEBE ir lo último) ────────────────────────────
run '~/.tmux/plugins/tpm/tpm'
